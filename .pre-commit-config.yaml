repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: prune-orphan-pyc
        name: prune orphan .pyc bytecode
        entry: python scripts/check_orphan_pyc.py
        language: system
        pass_filenames: false
        always_run: true
