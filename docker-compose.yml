services:
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: pot-provider
    restart: unless-stopped
    environment:
      - TOKEN_TTL=21600

  yt-monitor:
    build: .
    container_name: yt-monitor
    restart: unless-stopped
    depends_on:
      - pot-provider
    environment:
      - YT_POT_PROVIDER_URL=http://pot-provider:4416
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - ./channels.json:/app/channels.json
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./cookies.txt:/app/cookies.txt
    command: ["uv", "run", "python", "monitoring.py"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'monitoring.py' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  yt-web:
    build: .
    container_name: yt-web
    restart: unless-stopped
    depends_on:
      - pot-provider
    ports:
      - "8088:${YT_WEB_PORT:-8011}"
    environment:
      - YT_WEB_PORT=${YT_WEB_PORT}
      - YT_POT_PROVIDER_URL=http://pot-provider:4416
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - ./channels.json:/app/channels.json
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./cookies.txt:/app/cookies.txt
    command: ["sh", "-c", "uv run python main.py --host 0.0.0.0 --port $YT_WEB_PORT"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${YT_WEB_PORT:-8011}/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
